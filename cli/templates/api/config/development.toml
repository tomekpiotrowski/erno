api_url = "http://localhost:3000"
app_url = "http://localhost:4200"

[tracing]
log_level = "debug"

[database]
url = "postgres://{{db_name}}:{{db_password}}@localhost/{{db_name}}_development"
pool_size = 5

[server]
port = 3000

[email]
type = "mock"

[auth]
secret = "{{jwt_secret}}"
access_token_minutes = 15
one_time_token_expiry_hours = 24
refresh_token_days = 30

[jobs.cleanup]
interval_seconds = 3600
completed_retention_seconds = 7200
failed_retention_seconds = 172800
batch_size = 1000

[jobs.workers.default]
jobs = ["send_verification_email", "send_password_reset_email", "send_already_registered_email"]
count = 2
job_timeout = 300
max_retries = 4
base_retry_delay_seconds = 60
retry_backoff_multiplier = 5

[rate_limiting]
enabled = true
default_window_secs = 60
default_max_requests = 100
backoff_multiplier = 2.0

[cors]
allowed_origins = ["http://localhost:4200"]
