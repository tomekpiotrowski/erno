base_url = "https://example.com"

[tracing]
log_level = "info"

[database]
url = "postgres://{{db_name}}:CHANGE_ME_DB_PASSWORD@localhost/{{db_name}}_production"
pool_size = 10

[server]
port = 3000

[email]
type = "smtp"

[auth]
secret = "CHANGE_ME_run_erno_generate-jwt-secret"
access_token_minutes = 15
one_time_token_expiry_hours = 24
refresh_token_days = 30

[jobs.cleanup]
interval_seconds = 3600
completed_retention_seconds = 7200
failed_retention_seconds = 172800
batch_size = 1000

[jobs.workers.default]
jobs = ["send_verification_email", "send_password_reset_email", "send_already_registered_email"]
count = 4
job_timeout = 300
max_retries = 4
base_retry_delay_seconds = 60
retry_backoff_multiplier = 5

[rate_limiting]
enabled = true
default_window_secs = 60
default_max_requests = 100
backoff_multiplier = 2.0
