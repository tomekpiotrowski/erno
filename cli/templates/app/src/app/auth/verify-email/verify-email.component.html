<div class="auth-page">
  <div class="card">
    <h1>Verify email</h1>

    <p *ngIf="state === 'loading'">Verifying…</p>

    <div *ngIf="state === 'success'" class="success">
      Email verified — you can now sign in.
      <div class="links"><a routerLink="/login">Sign in</a></div>
    </div>

    <div *ngIf="state === 'error'" class="error">
      {{ error }}
      <div class="links"><a routerLink="/login">Back to sign in</a></div>
    </div>
  </div>
</div>
