<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Reset password</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-text color="success" *ngIf="done()">
        <p>If that email exists, you'll receive a reset link shortly.</p>
        <p><a routerLink="/login">Back to sign in</a></p>
      </ion-text>

      <form *ngIf="!done()" [formGroup]="form" (ngSubmit)="submit()">
        <ion-item>
          <ion-label position="floating">Email</ion-label>
          <ion-input type="email" formControlName="email" autocomplete="email"></ion-input>
        </ion-item>

        <ion-button expand="block" type="submit" [disabled]="loading()" class="ion-margin-top">
          {{ loading() ? 'Sending…' : 'Send reset link' }}
        </ion-button>
      </form>

      <p class="ion-text-center ion-margin-top" *ngIf="!done()">
        <a routerLink="/login">Back to sign in</a>
      </p>
    </ion-card-content>
  </ion-card>
</ion-content>
