<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Sign in</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-text color="success" *ngIf="resetSuccess">
        <p>Password updated — you can now sign in.</p>
      </ion-text>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <ion-item>
          <ion-label position="floating">Email</ion-label>
          <ion-input type="email" formControlName="email" autocomplete="email"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="floating">Password</ion-label>
          <ion-input type="password" formControlName="password" autocomplete="current-password"></ion-input>
        </ion-item>

        <ion-text color="danger" *ngIf="error">
          <p class="ion-padding-start">{{ error }}</p>
        </ion-text>

        <ion-button expand="block" type="submit" [disabled]="loading" class="ion-margin-top">
          {{ loading ? 'Signing in…' : 'Sign in' }}
        </ion-button>
      </form>

      <p class="ion-text-center ion-margin-top">
        <a routerLink="/forgot-password">Forgot password?</a>
        &nbsp;·&nbsp;
        <a routerLink="/register">Create account</a>
      </p>
    </ion-card-content>
  </ion-card>
</ion-content>
