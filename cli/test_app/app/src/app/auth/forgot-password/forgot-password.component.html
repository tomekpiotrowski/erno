<div class="auth-page">
  <div class="card">
    <h1>Reset password</h1>

    <div *ngIf="done" class="success">
      If that email exists, you'll receive a reset link shortly.
      <div class="links"><a routerLink="/login">Back to sign in</a></div>
    </div>

    <form *ngIf="!done" [formGroup]="form" (ngSubmit)="submit()">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" autocomplete="email" />

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Sending…' : 'Send reset link' }}
      </button>
    </form>

    <div class="links" *ngIf="!done">
      <a routerLink="/login">Back to sign in</a>
    </div>
  </div>
</div>
