<div class="auth-page">
  <div class="card">
    <h1>Create account</h1>

    <div *ngIf="done" class="success">
      Check your email to verify your account.
      <div class="links"><a routerLink="/login">Back to sign in</a></div>
    </div>

    <form *ngIf="!done" [formGroup]="form" (ngSubmit)="submit()">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" autocomplete="email" />

      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" autocomplete="new-password" />

      <label for="confirm">Confirm password</label>
      <input id="confirm" type="password" formControlName="confirm" autocomplete="new-password" />

      <div class="error" *ngIf="form.errors?.['mismatch'] && form.get('confirm')?.dirty">
        Passwords do not match.
      </div>
      <div class="error" *ngIf="error">{{ error }}</div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Creating account…' : 'Create account' }}
      </button>
    </form>

    <div class="links" *ngIf="!done">
      Already have an account? <a routerLink="/login">Sign in</a>
    </div>
  </div>
</div>
