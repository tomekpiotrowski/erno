<div class="auth-page">
  <div class="card">
    <h1>New password</h1>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label for="password">New password</label>
      <input id="password" type="password" formControlName="password" autocomplete="new-password" />

      <label for="confirm">Confirm password</label>
      <input id="confirm" type="password" formControlName="confirm" autocomplete="new-password" />

      <div class="error" *ngIf="form.errors?.['mismatch'] && form.get('confirm')?.dirty">
        Passwords do not match.
      </div>
      <div class="error" *ngIf="error">{{ error }}</div>

      <button type="submit" [disabled]="loading || !!(form.errors?.['mismatch'])">
        {{ loading ? 'Saving…' : 'Set new password' }}
      </button>
    </form>
  </div>
</div>
